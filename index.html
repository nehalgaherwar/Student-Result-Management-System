<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IIT Dolkpur | Student Result Portal</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Floating Background -->
    <div class="background">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="container">

        <!--- Toggle button -->

        <button id="theme-toggle" class="theme-toggle">
            <span class="toggle-circle">
                <span class="icon sun">☀️</span>
                <span class="icon moon">🌙</span>
            </span>
        </button>

        <!-- Header -->

        <div class="header">

            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
            </div>

            <h1>IIT Dolkpur</h1>

            <p>Official Student Result Management Portal</p>

        </div>

        <!-- Search Card -->

        <div class="search-card">

            <div class="input-group">

                <label>
                    <i class="fa-solid fa-user"></i>
                    Student Name
                </label>

                <input type="text" id="nameInput" placeholder="Enter Student Name">

            </div>

            <div class="input-group">

                <label>
                    <i class="fa-solid fa-id-card"></i>
                    Roll Number
                </label>

                <input type="number" id="rollInput" placeholder="101 - 160">

            </div>

            <div class="input-group">

                <label>
                    <i class="fa-solid fa-book"></i>
                    Semester
                </label>

                <select id="semester">

                    <option value="sem1">Semester 1</option>

                    <option value="sem2">Semester 2</option>

                </select>

            </div>

            <button id="checkBtn" onclick="checkResult()">

                <i class="fa-solid fa-magnifying-glass"></i>

                Check Result

            </button>

        </div>

        <!-- Loading -->

        <div id="loader" class="loader hidden">

            <div class="spinner"></div>

            <p>Fetching Student Result...</p>

        </div>

        <!-- Result -->

        <div id="result"></div>

        <!-- Footer -->

        <footer>

            <p>

                <i class="fa-solid fa-shield-halved"></i>

                IIT Dolkpur Examination Cell

            </p>

            <small>

                © 2026 Student Result Management System

            </small>

        </footer>

    </div>

    <script src="script.js"></script>

</body>

</html>
